name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECS_CLUSTER: edusync-prod

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push images
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          # Build API
          docker build -t $REGISTRY/edusync-api:latest -t $REGISTRY/edusync-api:$IMAGE_TAG packages/api/
          docker push $REGISTRY/edusync-api:latest
          docker push $REGISTRY/edusync-api:$IMAGE_TAG
          
          # Build Web
          docker build -t $REGISTRY/edusync-web:latest -t $REGISTRY/edusync-web:$IMAGE_TAG apps/web/
          docker push $REGISTRY/edusync-web:latest
          docker push $REGISTRY/edusync-web:$IMAGE_TAG
          
          # Build Admin
          docker build -t $REGISTRY/edusync-admin:latest -t $REGISTRY/edusync-admin:$IMAGE_TAG apps/admin/
          docker push $REGISTRY/edusync-admin:latest
          docker push $REGISTRY/edusync-admin:$IMAGE_TAG
          
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV
          echo "REGISTRY=$REGISTRY" >> $GITHUB_ENV

      - name: Run smoke tests
        run: |
          npm --workspace=@edusync/api run test:smoke

      - name: Update ECS services
        run: |
          # Update API service
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service edusync-api \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}
          
          # Update Web service
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service edusync-web \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}
          
          # Update Admin service
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service edusync-admin \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}

      - name: Wait for services to stabilize
        run: |
          aws ecs wait services-stable \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services edusync-api edusync-web edusync-admin \
            --region ${{ env.AWS_REGION }}

      - name: Run health checks
        run: |
          # Get ALB DNS
          ALB_DNS=$(aws elbv2 describe-load-balancers \
            --query 'LoadBalancers[?LoadBalancerName==`edusync-prod-alb`].DNSName' \
            --output text \
            --region ${{ env.AWS_REGION }})
          
          # Check health endpoints
          curl -f http://$ALB_DNS/api/v1/health || exit 1
          curl -f http://$ALB_DNS/ || exit 1
          echo "✅ All services healthy"

      - name: Notify Slack (optional)
        if: always()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK }}
          payload: |
            {
              "text": "EduSync Deployment ${{ job.status }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Deployment Status:* ${{ job.status }}\n*Commit:* <${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|${{ github.sha }}>\n*Branch:* ${{ github.ref }}"
                  }
                }
              ]
            }
