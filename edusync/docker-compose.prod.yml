version: '3.8'

services:
  edusync-api:
    build:
      context: ./packages/api
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/edusync
      - MONGODB_URI=mongodb://root:root@mongodb:27017/edusync?authSource=admin
    depends_on:
      - db
      - mongodb

  edusync-web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - API_URL=http://edusync-api:3001
    depends_on:
      - edusync-api

  edusync-admin:
    build:
      context: ./apps/admin
      dockerfile: Dockerfile
    ports:
      - "3002:3002"
    environment:
      - NODE_ENV=production
      - API_URL=http://edusync-api:3001
    depends_on:
      - edusync-api

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=edusync
    ports:
      - "5432:5432"

  mongodb:
    image: mongo:6-jammy
    environment:
      - MONGO_INITDB_ROOT_USERNAME=root
      - MONGO_INITDB_ROOT_PASSWORD=root
    ports:
      - "27017:27017"
