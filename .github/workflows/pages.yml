name: Deploy PRISM Website to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'prism-etpd/website/**'
      - 'prism-etpd/assets/**'
      - 'prism-etpd/.github/workflows/pages.yml'

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Pages
        uses: actions/configure-pages@v3

      - name: Build and Setup structure
        run: |
          mkdir -p public
          cp -r prism-etpd/website/* public/
          cp -r prism-etpd/assets public/assets || true
          
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './public'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
