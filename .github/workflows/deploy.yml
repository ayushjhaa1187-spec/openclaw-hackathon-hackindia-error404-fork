name: Deploy

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

defaults:
  run:
    working-directory: edusync

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      mongodb:
        image: mongo:6.0
        ports:
          - 27017:27017
      
      postgres:
        image: postgres:15
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: edusync_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      
      meilisearch:
        image: getmeili/meilisearch:latest
        ports:
          - 7700:7700
        env:
          MEILI_MASTER_KEY: test-key
        options: >-
          --health-cmd "curl -f http://localhost:7700/health"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: edusync/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Build dependencies
        run: npm run build --workspace=@edusync/shared --workspace=@edusync/db

      - name: Type check
        run: npm --workspace=@edusync/api run type-check

      - name: Unit tests
        run: npm --workspace=@edusync/api run test:unit
        continue-on-error: false

      - name: Integration tests
        run: npm --workspace=@edusync/api run test:integration
        continue-on-error: false

      - name: Lint
        run: npm --workspace=@edusync/api run lint
        continue-on-error: true

      # ⭐ CRITICAL: Smoke Tests (blocks deployment)
      - name: Seed Database
        run: npm --workspace=@edusync/db run seed
        env:
          MONGO_URI: mongodb://localhost:27017/edusync_test
          POSTGRES_HOST: localhost
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: edusync_test

      - name: Run Smoke Tests
        id: smoke-tests
        run: |
          npm --workspace=@edusync/api run dev &
          sleep 15
          npm --workspace=@edusync/api run test:smoke
        timeout-minutes: 5
        env:
          API_URL: http://localhost:3001/api/v1
          NEXUS_JWT_SECRET: test-secret-key-2026
          MONGO_URI: mongodb://localhost:27017/edusync_test
          POSTGRES_HOST: localhost
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: edusync_test
          REDIS_URL: redis://localhost:6379
          MEILISEARCH_HOST: http://localhost:7700
          MEILISEARCH_MASTER_KEY: test-key

      - name: Build API
        run: npm --workspace=@edusync/api run build

      - name: Build Web
        run: npm --workspace=@edusync/web run build

      - name: Build Admin
        run: npm --workspace=@edusync/admin run build

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      id-token: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push to ECR
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          # Build and push API
          docker build -t $REGISTRY/edusync-api:latest packages/api/
          docker push $REGISTRY/edusync-api:latest
          
          # Build and push Web
          docker build -t $REGISTRY/edusync-web:latest apps/web/
          docker push $REGISTRY/edusync-web:latest
          
          # Build and push Admin
          docker build -t $REGISTRY/edusync-admin:latest apps/admin/
          docker push $REGISTRY/edusync-admin:latest

      - name: Update ECS Services
        run: |
          aws ecs update-service --cluster edusync-prod --service edusync-api --force-new-deployment
          aws ecs update-service --cluster edusync-prod --service edusync-web --force-new-deployment
          aws ecs update-service --cluster edusync-prod --service edusync-admin --force-new-deployment
