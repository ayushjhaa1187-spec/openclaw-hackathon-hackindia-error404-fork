<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="spectrum" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6B6B" />
      <stop offset="25%" stop-color="#FFA500" />
      <stop offset="50%" stop-color="#FFD700" />
      <stop offset="75%" stop-color="#4CAF50" />
      <stop offset="100%" stop-color="#2196F3" />
    </linearGradient>
    <linearGradient id="primary" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6B46C1" />
      <stop offset="100%" stop-color="#1a365d" />
    </linearGradient>
  </defs>
  
  <!-- Outer Prism shape -->
  <polygon points="100,20 180,60 180,140 100,180 20,140 20,60" fill="url(#primary)" opacity="0.9" />
  
  <!-- Facets -->
  <polygon points="100,20 180,60 100,100" fill="url(#spectrum)" opacity="0.8" />
  <polygon points="180,60 180,140 100,100" fill="url(#spectrum)" opacity="0.6" />
  <polygon points="180,140 100,180 100,100" fill="url(#spectrum)" opacity="0.4" />
  <polygon points="100,180 20,140 100,100" fill="url(#primary)" opacity="0.6" />
  <polygon points="20,140 20,60 100,100" fill="url(#spectrum)" opacity="0.7" />
  <polygon points="20,60 100,20 100,100" fill="url(#primary)" opacity="0.5" />
  
  <!-- Center lines/refractions -->
  <line x1="100" y1="20" x2="100" y2="180" stroke="white" stroke-width="2" opacity="0.4" />
  <line x1="20" y1="60" x2="180" y2="140" stroke="white" stroke-width="2" opacity="0.4" />
  <line x1="20" y1="140" x2="180" y2="60" stroke="white" stroke-width="2" opacity="0.4" />
</svg>
